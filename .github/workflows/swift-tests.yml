name: VocalCore Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -switch /Applications/Xcode_16.app

      - name: Show Swift Version
        run: swift --version

      - name: Run Tests
        run: swift test